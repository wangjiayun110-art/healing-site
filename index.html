<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>AI星语 | 深度八字精批</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; font-family: 'Noto Sans SC', sans-serif; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-top: 10vh; }
        .logo-circle { width: 130px; height: 130px; background: #e69d45; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 40px; box-shadow: 0 10px 20px rgba(230, 157, 69, 0.2); }
        .input-container { width: 90%; max-width: 800px; background: #fff; border-radius: 28px; padding: 25px 35px; box-shadow: 0 20px 60px rgba(0,0,0,0.06); border: 1px solid #f0f0f0; position: relative; min-height: 180px; }
        .chat-input { width: 100%; border: none; outline: none; font-size: 18px; resize: none; background: transparent; min-height: 120px; }
        .send-btn { position: absolute; bottom: 25px; right: 25px; width: 50px; height: 50px; background: #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .send-btn.active { background: #111; }
        .overlay { display: none; position: fixed; inset: 0; background: #fff; z-index: 1000; overflow-y: auto; padding: 60px 24px; flex-direction: column; align-items: center; }
        .analysis-text { font-size: 1.15rem; line-height: 2; color: #444; text-align: justify; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="logo-circle"><svg width="70" height="70" fill="white" viewBox="0 0 100 100"><path d="M50,10c-22.1,0-40,17.9-40,40s17.9,40,40,40s40-17.9,40-40S72.1,10,50,10z"/></svg></div>
    <h1 class="text-3xl font-light mb-6 tracking-widest text-gray-800">八字运势精批</h1>
    <p class="max-w-lg text-center text-sm text-gray-500 mb-12 px-6">AI 大师在线为您深度解读命理。</p>

    <div class="input-container">
        <span class="text-[10px] text-gray-300 font-bold uppercase mb-2">有问题问小白...</span>
        <textarea id="userInput" class="chat-input" placeholder="输入：1995年10月1日 12:30 上海"></textarea>
        <div id="sendBtn" class="send-btn" onclick="askAI()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </div>
    </div>

    <div id="resultOverlay" class="overlay">
        <div class="w-full max-w-xl">
            <div class="flex justify-between items-center mb-12"><h2 class="text-3xl font-bold">精批报告</h2><button onclick="location.reload()" class="text-gray-300 text-4xl">✕</button></div>
            <div id="aiLoading" class="text-orange-500 font-bold mb-8">大师正在研判，请稍候...</div>
            <div id="aiOutput" class="analysis-text pb-32"></div>
            <div class="fixed bottom-10 left-0 w-full flex justify-center"><button onclick="location.reload()" class="px-14 py-4 bg-gray-900 text-white rounded-full font-bold">返回</button></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        input.addEventListener('input', () => { if(input.value.trim().length > 0) btn.classList.add('active'); else btn.classList.remove('active'); });

        async function askAI() {
            const text = input.value.trim();
            if(!text) return;
            document.getElementById('resultOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';

            try {
                const res = await fetch("https://ai-bazi-proxy.wjy130533.workers.dev/", {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ prompt: text })
                });
                const data = await res.json();
                
                if(data.result) {
                    document.getElementById('aiLoading').style.display = 'none';
                    document.getElementById('aiOutput').innerText = data.result;
                }
            } catch (e) { document.getElementById('aiLoading').innerText = "连接中断，请刷新重试。"; }
        }
    </script>
</body>
</html>
