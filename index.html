
    <!DOCTYPE html>
    <html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
        <title>AI星语 · 深度疗愈百科</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
        <style>
            body { background: #020617; font-family: 'Noto Serif SC', serif; min-height: 100vh; color: #f8fafc; overflow-x: hidden; }
            
            /* 新背景：静谧雪山星空 */
            .star-bg { 
                position: fixed; inset: 0; z-index: -1; 
                background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1920&q=80'); 
                background-size: cover; background-position: center; opacity: 0.4;
                filter: brightness(0.8);
            }
            
            .glass-card { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(25px); border-radius: 48px; transition: all 0.6s ease; }
            .title-font { font-family: 'Zhi Mang Xing', cursive; }
            
            .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(40px); z-index: 999; align-items: flex-end; md:align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s ease; }
            .modal-active { display: flex !important; opacity: 1; }
            
            .modal-content { 
                transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
                max-height: 90vh; overflow-y: auto; width: 100%; md:width: 90%; md:max-width: 700px; 
                border-radius: 48px 48px 0 0; md:border-radius: 48px; 
                box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
            }
            .modal-active .modal-content { transform: translateY(0); }
            
            /* 文字排版优化 */
            .deep-text { font-size: 1.125rem; line-height: 2; letter-spacing: 0.02em; }
            ::-webkit-scrollbar { width: 0; }
        </style>
    </head>
    <body class="p-6 md:p-20">
        <div class="star-bg"></div>

        <header class="text-center mb-32 md:mb-56 mt-20 px-8">
            <h1 class="text-8xl md:text-[12rem] title-font text-white mb-8 drop-shadow-[0_0_50px_rgba(255,255,255,0.3)] tracking-tighter">AI星语</h1>
            <p class="text-indigo-300 tracking-[1em] text-[10px] md:text-base uppercase font-black opacity-70">Encyclopedia of Infinite Healing</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 md:gap-20 max-w-[100rem] mx-auto pb-64 px-4">
            
        <div class="glass-card group overflow-hidden border border-white/10 shadow-2xl">
            <div class="h-64 overflow-hidden relative">
                <img src="https://images.unsplash.com/photo-1500000000000?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover opacity-70 transition-transform duration-1000 group-hover:scale-110" alt="白羊座">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/40 to-transparent"></div>
                <div class="absolute bottom-8 left-10">
                    <span class="text-7xl block drop-shadow-2xl mb-2">♈️</span>
                    <h3 class="text-4xl font-bold text-white tracking-tighter">白羊座</h3>
                </div>
            </div>
            <div class="p-10 bg-slate-900/60">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-xs font-black text-indigo-400 tracking-[0.3em] uppercase">Daily Oracle</span>
                    <span class="text-xs text-amber-200/60 italic font-medium">勇气与新生</span>
                </div>
                <p class="text-slate-300 leading-relaxed text-lg mb-10 line-clamp-3 font-light">
                    “ 今日白羊座的能量在‘创造宫’汇聚。你会感到一种强烈的冲动去打破现状，无论是职场上一个大胆的提议，还是生活中一个积压已久的决定，今日都是最佳的切入点。水星的相位提醒你，言语的温和将是你最大的武器。下午三点左右，一个意外的消息可能会带来关于合作的新灵感，请保持感官的完全开放。 ”
                </p>
                <div class="flex justify-between items-center border-t border-white/5 pt-8">
                    <button onclick="openDeepHoro(0)" class="text-white text-sm font-black tracking-widest hover:text-indigo-400 transition-all uppercase border-b-2 border-indigo-500/50 pb-2 cursor-pointer">深度解析 / Explore →</button>
                </div>
            </div>
        </div>
        
        </div>

        <!-- Pop-up -->
        <div id="hModal" class="modal-overlay" onclick="closeDeepHoro()">
            <div class="modal-content glass-card p-10 md:p-20 relative border border-white/10" onclick="event.stopPropagation()">
                <div class="w-16 h-1.5 bg-white/20 rounded-full mx-auto mb-10 md:hidden"></div>
                <button onclick="closeDeepHoro()" class="hidden md:block absolute top-10 right-12 text-slate-500 text-5xl hover:text-white transition font-thin">✕</button>
                
                <div class="flex items-center gap-10 mb-16">
                    <span id="mIcon" class="text-9xl drop-shadow-2xl">♈️</span>
                    <div>
                        <h2 id="mSign" class="text-5xl md:text-6xl font-black text-white tracking-tighter"></h2>
                        <p id="mTheme" class="text-indigo-400 font-black tracking-[0.4em] text-xs uppercase mt-4 opacity-80"></p>
                    </div>
                </div>

                <div class="space-y-16 pb-20">
                    <section>
                        <h4 class="text-sm font-black text-indigo-300 mb-6 uppercase tracking-[0.3em] flex items-center gap-3">
                            <span class="w-2.5 h-2.5 rounded-full bg-indigo-500 animate-pulse"></span> 今日星象详述
                        </h4>
                        <p id="mToday" class="deep-text text-slate-200 font-light italic"></p>
                    </section>

                    <section class="space-y-10 py-12 border-y border-white/5">
                        <div class="bg-slate-900/30 p-8 rounded-[2.5rem] border border-white/5">
                            <h4 class="text-xs font-black text-pink-400 mb-4 uppercase tracking-widest">💓 情感流向 / Love</h4>
                            <p id="mLove" class="text-slate-300 text-lg leading-relaxed font-light"></p>
                        </div>
                        <div class="bg-slate-900/30 p-8 rounded-[2.5rem] border border-white/5">
                            <h4 class="text-xs font-black text-indigo-400 mb-4 uppercase tracking-widest">💼 事业进阶 / Career</h4>
                            <p id="mCareer" class="text-slate-300 text-lg leading-relaxed font-light"></p>
                        </div>
                    </section>

                    <section>
                        <h4 class="text-sm font-black text-amber-200 mb-6 uppercase tracking-[0.3em] flex items-center gap-3">
                            <span class="w-2.5 h-2.5 rounded-full bg-amber-400"></span> 2026 年度宏观展望
                        </h4>
                        <div class="bg-amber-900/10 p-10 rounded-[3rem] border border-amber-900/20">
                            <p id="mYearly" class="deep-text text-slate-200 font-light italic leading-loose"></p>
                        </div>
                    </section>

                    <section class="flex flex-wrap gap-6">
                        <div class="bg-slate-950/50 px-8 py-5 rounded-3xl border border-white/5"><span class="text-[10px] text-slate-500 block mb-2 uppercase tracking-widest">幸运色</span><span id="mColor" class="text-lg font-bold text-indigo-200"></span></div>
                        <div class="bg-slate-950/50 px-8 py-5 rounded-3xl border border-white/5"><span class="text-[10px] text-slate-500 block mb-2 uppercase tracking-widest">幸运数</span><span id="mNumber" class="text-lg font-bold text-indigo-200"></span></div>
                        <div class="bg-slate-950/50 px-8 py-5 rounded-3xl border border-white/5"><span class="text-[10px] text-slate-500 block mb-2 uppercase tracking-widest">契合</span><span id="mMatch" class="text-lg font-bold text-indigo-200"></span></div>
                    </section>
                </div>
            </div>
        </div>

        <script>
            const db = [{"sign": "\u767d\u7f8a\u5ea7", "icon": "\u2648\ufe0f", "theme": "\u52c7\u6c14\u4e0e\u65b0\u751f", "today_analysis": "\u4eca\u65e5\u767d\u7f8a\u5ea7\u7684\u80fd\u91cf\u5728\u2018\u521b\u9020\u5bab\u2019\u6c47\u805a\u3002\u4f60\u4f1a\u611f\u5230\u4e00\u79cd\u5f3a\u70c8\u7684\u51b2\u52a8\u53bb\u6253\u7834\u73b0\u72b6\uff0c\u65e0\u8bba\u662f\u804c\u573a\u4e0a\u4e00\u4e2a\u5927\u80c6\u7684\u63d0\u8bae\uff0c\u8fd8\u662f\u751f\u6d3b\u4e2d\u4e00\u4e2a\u79ef\u538b\u5df2\u4e45\u7684\u51b3\u5b9a\uff0c\u4eca\u65e5\u90fd\u662f\u6700\u4f73\u7684\u5207\u5165\u70b9\u3002\u6c34\u661f\u7684\u76f8\u4f4d\u63d0\u9192\u4f60\uff0c\u8a00\u8bed\u7684\u6e29\u548c\u5c06\u662f\u4f60\u6700\u5927\u7684\u6b66\u5668\u3002\u4e0b\u5348\u4e09\u70b9\u5de6\u53f3\uff0c\u4e00\u4e2a\u610f\u5916\u7684\u6d88\u606f\u53ef\u80fd\u4f1a\u5e26\u6765\u5173\u4e8e\u5408\u4f5c\u7684\u65b0\u7075\u611f\uff0c\u8bf7\u4fdd\u6301\u611f\u5b98\u7684\u5b8c\u5168\u5f00\u653e\u3002", "yearly_analysis": "2026\u5e74\u5bf9\u767d\u7f8a\u5ea7\u800c\u8a00\u662f\u2018\u91cd\u5851\u81ea\u6211\u2019\u7684\u5173\u952e\u5e74\u3002\u6728\u661f\u5728\u4f60\u7684\u547d\u5bab\u505c\u7559\uff0c\u4e3a\u4f60\u5e26\u6765\u4e86\u524d\u6240\u672a\u6709\u7684\u6269\u5f20\u673a\u9047\u3002\u4e0a\u534a\u5e74\uff0c\u4f60\u53ef\u80fd\u4f1a\u7ecf\u5386\u804c\u573a\u73af\u5883\u7684\u5267\u70c8\u53d8\u52a8\uff0c\u8fd9\u5b9e\u9645\u4e0a\u662f\u5728\u4e3a\u4f60\u672a\u6765\u7684\u5341\u5e74\u94fa\u8def\u3002\u4e0b\u534a\u5e74\uff0c\u91cd\u5fc3\u5c06\u8f6c\u5411\u5185\u5728\u6210\u957f\u4e0e\u5bb6\u5ead\u5173\u7cfb\u7684\u4fee\u590d\u3002\u8fd9\u4e00\u5e74\uff0c\u4f60\u7684\u5173\u952e\u8bcd\u662f\u2018\u575a\u97e7\u2019\uff0c\u5728\u6bcf\u4e00\u6b21\u60f3\u8981\u653e\u5f03\u7684\u65f6\u5019\uff0c\u8bf7\u8bb0\u4f4f\uff0c\u90a3\u662f\u7834\u8327\u6210\u8776\u524d\u6700\u6df1\u7684\u9ed1\u6697\u3002", "details": {"love": "\u4eca\u65e5\u60c5\u611f\u78c1\u573a\u67d4\u548c\u3002\u5355\u8eab\u8005\u5728\u5de5\u4f5c\u5f80\u6765\u4e2d\u53ef\u80fd\u4f1a\u9047\u5230\u5fd7\u540c\u9053\u5408\u7684\u4f19\u4f34\uff1b\u6709\u4f34\u8005\u9002\u5408\u8fdb\u884c\u4e00\u6b21\u5173\u4e8e\u672a\u6765\u7684\u6df1\u5ea6\u8c08\u8bdd\uff0c\u5766\u8bda\u662f\u6700\u597d\u7684\u589e\u8fdb\u5242\u3002", "career": "\u804c\u573a\u6267\u884c\u529b\u6ee1\u683c\u3002\u867d\u7136\u4f1a\u6709\u7410\u788e\u7684\u4efb\u52a1\u6253\u6270\uff0c\u4f46\u4f60\u7684\u5927\u5c40\u89c2\u80fd\u8ba9\u4f60\u5728\u4e71\u5c40\u4e2d\u627e\u5230\u6700\u4f18\u8def\u5f84\u3002\u4eca\u65e5\u9002\u5408\u5904\u7406\u5408\u540c\u6216\u8fdb\u884c\u957f\u8fdc\u89c4\u5212\u3002", "wealth": "\u8d22\u8fd0\u5448\u73b0\u7a33\u6b65\u4e0a\u5347\u8d8b\u52bf\u3002\u9002\u5408\u5173\u6ce8\u957f\u671f\u7684\u7a33\u5065\u6295\u8d44\uff0c\u800c\u975e\u77ed\u671f\u7684\u6295\u673a\u3002\u4eca\u65e5\u5728\u793e\u4ea4\u4e0a\u7684\u82b1\u8d39\u4f1a\u4e3a\u4f60\u6362\u6765\u6709\u4ef7\u503c\u7684\u4fe1\u606f\u3002"}, "lucky": {"color": "\u706b\u7ea2\u8272", "number": "9", "match": "\u72ee\u5b50\u5ea7", "item": "\u767d\u8272\u6269\u9999\u77f3"}}];
            function openDeepHoro(idx) {
                const item = db[idx];
                document.getElementById('mSign').innerText = item.sign;
                document.getElementById('mIcon').innerText = item.icon;
                document.getElementById('mTheme').innerText = item.theme;
                document.getElementById('mToday').innerText = item.today_analysis;
                document.getElementById('mYearly').innerText = item.yearly_analysis;
                document.getElementById('mLove').innerText = item.details.love;
                document.getElementById('mCareer').innerText = item.details.career;
                document.getElementById('mColor').innerText = item.lucky.color;
                document.getElementById('mNumber').innerText = item.lucky.number;
                document.getElementById('mMatch').innerText = item.lucky.match;
                
                document.getElementById('hModal').classList.add('modal-active');
                document.body.style.overflow = 'hidden';
            }
            function closeDeepHoro() {
                document.getElementById('hModal').classList.remove('modal-active');
                document.body.style.overflow = 'auto';
            }
        </script>
    </body>
    </html>
